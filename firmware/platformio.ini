[platformio]
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -DCORE_DEBUG_LEVEL=3
lib_deps =
  adafruit/Adafruit GFX Library @ ^1.11.10
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
  adafruit/Adafruit ADXL345 @ ^1.3.4
  claws/BH1750 @ ^1.3.0

test_build_src = yes

[env:native]
platform = native
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
src_filter =
  +<../host/main_host.cpp>
  +<domain/types.cpp>
  +<domain/actions.cpp>
  +<game/rules.cpp>
  +<game/mutations.cpp>
  +<input/input_interpreter.cpp>
  +<ui/ui_fsm.cpp>
  +<storage/migrations.cpp>
  +<telemetry/event_bus.cpp>
  +<telemetry/recorder.cpp>
